server:
  port: 8080

spring:
  application:
    name: gearshare

  datasource:
    url: jdbc:mariadb://localhost:3306/gearshare_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false

logging:
  level:
    com.softuni.gearshare: DEBUG
    org.hibernate.SQL: DEBUG
