<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Bookings')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page">
    <div class="page-header">
        <div class="eyebrow">Renter dashboard</div>
        <h1>My bookings</h1>
    </div>

    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        You haven't requested any bookings yet.
        <a th:href="@{/equipment}">Browse equipment</a>.
    </div>

    <div class="record-list" th:unless="${#lists.isEmpty(bookings)}">
        <div class="record-card" th:each="b : ${bookings}">
            <div class="record-main">
                <span class="record-title" th:text="${b.equipment.name}">Equipment name</span>
                <span class="record-detail">
                    <span th:text="${b.startDate}">start</span> &#8594; <span th:text="${b.endDate}">end</span>
                    &#183; $<span th:text="${b.totalPrice}">0</span>
                </span>
            </div>
            <div class="record-actions">
                <span class="status-pill" th:classappend="'status-' + ${#strings.toLowerCase(b.status)}" th:text="${b.status}">STATUS</span>
                <a th:if="${b.status.name() == 'PENDING'}" class="btn btn-outline btn-small" th:href="@{/bookings/{id}/edit(id=${b.id})}">Edit</a>
                <form th:if="${b.status.name() == 'PENDING' || b.status.name() == 'APPROVED'}"
                      th:action="@{/bookings/{id}/cancel(id=${b.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-danger btn-small">Cancel</button>
                </form>
                <a th:if="${b.status.name() == 'COMPLETED'}" class="btn btn-primary btn-small" th:href="@{/reviews/new/{id}(id=${b.id})}">Leave a review</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
