<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Booking Requests')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page">
    <div class="page-header">
        <div class="eyebrow">Owner dashboard</div>
        <h1>Booking requests</h1>
    </div>

    <div th:if="${#lists.isEmpty(bookings)}" class="empty-state">
        No booking requests yet for your equipment.
    </div>

    <div class="record-list" th:unless="${#lists.isEmpty(bookings)}">
        <div class="record-card" th:each="b : ${bookings}">
            <div class="record-main">
                <span class="record-title" th:text="${b.equipment.name}">Equipment name</span>
                <span class="record-detail">
                    <span th:text="${b.renter.username}">renter</span> &#183;
                    <span th:text="${b.startDate}">start</span> &#8594; <span th:text="${b.endDate}">end</span>
                    &#183; $<span th:text="${b.totalPrice}">0</span>
                </span>
            </div>
            <div class="record-actions">
                <span class="status-pill" th:classappend="'status-' + ${#strings.toLowerCase(b.status)}" th:text="${b.status}">STATUS</span>

                <form th:if="${b.status.name() == 'PENDING'}" th:action="@{/bookings/{id}/approve(id=${b.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-primary btn-small">Approve</button>
                </form>
                <form th:if="${b.status.name() == 'PENDING'}" th:action="@{/bookings/{id}/reject(id=${b.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-danger btn-small">Reject</button>
                </form>
                <form th:if="${b.status.name() == 'APPROVED'}" th:action="@{/bookings/{id}/complete(id=${b.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-outline btn-small">Mark completed</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
