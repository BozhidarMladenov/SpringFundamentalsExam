<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Edit Booking')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page-narrow">
    <div class="page-header">
        <div class="eyebrow">Edit request</div>
        <h1 th:text="${booking.equipment.name}">Equipment name</h1>
    </div>

    <form class="form-card" th:action="@{/bookings/{id}/edit(id=${booking.id})}" th:object="${bookingFormRequest}" method="post">

        <div class="form-row">
            <div class="form-group">
                <label for="startDate">Start date</label>
                <input type="date" id="startDate" th:field="*{startDate}"/>
                <div class="field-error" th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></div>
            </div>
            <div class="form-group">
                <label for="endDate">End date</label>
                <input type="date" id="endDate" th:field="*{endDate}"/>
                <div class="field-error" th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save changes</button>
            <a class="btn btn-secondary" th:href="@{/bookings/mine}">Cancel</a>
        </div>
    </form>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
