<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('List Equipment')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page-narrow">
    <div class="page-header">
        <div class="eyebrow">New listing</div>
        <h1>List your equipment</h1>
    </div>

    <form class="form-card" th:action="@{/equipment/create}" th:object="${equipmentFormRequest}" method="post">

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="e.g. Canon EOS R6 with 24-70mm lens"/>
            <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{category}">
                <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" placeholder="Condition, what's included, pickup notes&#8230;"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="dailyPrice">Daily price ($)</label>
                <input type="number" step="0.01" id="dailyPrice" th:field="*{dailyPrice}"/>
                <div class="field-error" th:if="${#fields.hasErrors('dailyPrice')}" th:errors="*{dailyPrice}"></div>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" th:field="*{location}" placeholder="City or neighborhood"/>
                <div class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Publish listing</button>
            <a class="btn btn-secondary" th:href="@{/equipment/mine}">Cancel</a>
        </div>
    </form>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
