<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Listings')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page">
    <div class="page-header">
        <div class="eyebrow">Owner dashboard</div>
        <h1>My listings</h1>
    </div>

    <div th:if="${#lists.isEmpty(equipmentList)}" class="empty-state">
        You haven't listed any equipment yet.
        <a th:href="@{/equipment/create}">List your first item</a>.
    </div>

    <div class="record-list" th:unless="${#lists.isEmpty(equipmentList)}">
        <div class="record-card" th:each="item : ${equipmentList}">
            <div class="record-main">
                <span class="record-title" th:text="${item.name}">Name</span>
                <span class="record-detail">
                    $<span th:text="${item.dailyPrice}">0</span>/day &#183;
                    <span th:text="${item.available} ? 'Available' : 'Unavailable'">Status</span>
                </span>
            </div>
            <div class="record-actions">
                <a class="btn btn-outline btn-small" th:href="@{/equipment/{id}(id=${item.id})}">View</a>
                <a class="btn btn-outline btn-small" th:href="@{/equipment/{id}/edit(id=${item.id})}">Edit</a>
                <form th:action="@{/equipment/{id}/toggle-availability(id=${item.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-secondary btn-small"
                            th:text="${item.available} ? 'Mark unavailable' : 'Mark available'"></button>
                </form>
                <form th:action="@{/equipment/{id}/delete(id=${item.id})}" method="post" class="inline-form">
                    <button type="submit" class="btn btn-danger btn-small">Delete</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
