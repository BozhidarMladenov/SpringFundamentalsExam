<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${equipment.name})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page">
    <div class="page-header">
        <div class="eyebrow" th:text="${equipment.category}">CATEGORY</div>
        <h1 th:text="${equipment.name}">Equipment name</h1>
        <p class="page-subtitle" th:text="${equipment.location}">Location</p>
    </div>

    <div class="detail-layout">
        <div class="detail-panel">
            <h3>Description</h3>
            <p th:text="${equipment.description}">Description text.</p>

            <h3 style="margin-top:28px;">Reviews</h3>
            <div th:if="${#lists.isEmpty(reviews)}" class="helper-text">No reviews yet.</div>
            <div th:each="review : ${reviews}" class="review-item">
                <span class="review-rating" th:text="${review.rating} + ' / 5'">5 / 5</span>
                <p th:if="${review.comment}" th:text="${review.comment}" style="margin:6px 0 0;"></p>
            </div>
        </div>

        <div class="detail-sidebar">
            <div class="price-tag" style="font-size:24px; margin-bottom:4px;">
                $<span th:text="${equipment.dailyPrice}">0</span><span class="unit">/day</span>
            </div>
            <p class="helper-text" th:if="${equipment.available}">Available to book</p>
            <p class="helper-text" th:unless="${equipment.available}">Currently unavailable</p>

            <div sec:authorize="hasRole('RENTER')" style="margin-top:16px;">
                <a th:if="${equipment.available}" class="btn btn-primary" style="width:100%; text-align:center;"
                   th:href="@{/bookings/new/{id}(id=${equipment.id})}">Request to book</a>
            </div>
            <div sec:authorize="!isAuthenticated()" style="margin-top:16px;">
                <a class="btn btn-secondary" style="width:100%; text-align:center;" th:href="@{/auth/login}">Log in to book</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
