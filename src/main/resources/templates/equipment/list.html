<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Browse Equipment')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page">
    <div class="page-header">
        <div class="eyebrow">Available now</div>
        <h1>Browse equipment</h1>
        <p class="page-subtitle">Everything listed here is currently available to book.</p>
    </div>

    <div th:if="${#lists.isEmpty(equipmentList)}" class="empty-state">
        Nothing's listed yet. Be the first to <a th:href="@{/auth/register}">sign up as an owner</a>.
    </div>

    <div class="equipment-grid" th:unless="${#lists.isEmpty(equipmentList)}">
        <div class="equipment-card" th:each="item : ${equipmentList}">
            <span class="category-tag" th:text="${item.category}">CATEGORY</span>
            <h3 th:text="${item.name}">Equipment name</h3>
            <p class="desc" th:text="${#strings.abbreviate(item.description, 90)}">Description</p>
            <div class="meta-row">
                <span th:text="${item.location}">Location</span>
                <span class="price-tag">$<span th:text="${item.dailyPrice}">0</span><span class="unit">/day</span></span>
            </div>
            <a class="btn btn-outline btn-small" th:href="@{/equipment/{id}(id=${item.id})}">View details</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
