<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Error')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="page-narrow" style="text-align:center;">
    <div class="error-stamp" th:text="${statusCode}">ERR</div>
    <h1>Something went wrong</h1>
    <p class="page-subtitle" th:text="${errorMessage}">An unexpected error occurred.</p>
    <a class="btn btn-primary" th:href="@{/}">Back to home</a>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
